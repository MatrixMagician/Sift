# Frozen ground truth (D-02): authored before any prompt tuning. Do not edit to
# make a run pass — a regression must fail, not be silently accommodated.
root_cause: >
  The /data volume on node store-01 filled to capacity: usage climbed steadily
  past the low-space warning threshold to 100%, after which every segment write
  and log rotation failed with ENOSPC (no space left on device) and the ingest
  writer halted, returning 507 insufficient-storage responses. The exhausted
  disk is the root cause; the failed writes and 507s are the symptoms.
required_evidence:            # regexes, matched case-insensitively against the clusters fed to the model
  - "ENOSPC|no space left on device"
  - "disk full|/data full|507 insufficient storage"
  - "usage \\d+%|low disk space"
acceptable_keywords:          # any-of, case-insensitive, vs hypothesis title + narrative
  - disk
  - space
  - ENOSPC
  - full
expect_no_incident: false
