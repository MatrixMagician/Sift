# Frozen ground truth (D-02): authored before any prompt tuning. Do not edit to
# make a run pass — a regression must fail, not be silently accommodated.
root_cause: >
  The request executor's fixed 32-thread worker pool saturated under sustained
  load: all workers stayed busy, the backlog queue grew unbounded, and once the
  queue filled the pool began rejecting tasks (RejectedExecutionException) and
  returning 503s until the executor stopped completing work. Thread-pool
  exhaustion is the root cause; the rejected tasks and 503s are the symptoms.
required_evidence:            # regexes, matched case-insensitively against the clusters fed to the model
  - "thread pool (saturated|exhausted)"
  - "RejectedExecutionException|task rejected"
  - "queue depth \\d+"
acceptable_keywords:          # any-of, case-insensitive, vs hypothesis title + narrative
  - thread
  - pool
  - exhaust
  - queue
expect_no_incident: false
